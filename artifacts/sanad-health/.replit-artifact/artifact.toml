kind = "web"
previewPath = "/"
title = "سَنَد - المنظومة الصحية"
version = "1.0.0"
id = "artifacts/sanad-health"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18543

[services.development]
run = "pnpm --filter @workspace/sanad-health run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sanad-health", "run", "build" ]
publicDir = "artifacts/sanad-health/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18543"
BASE_PATH = "/"
